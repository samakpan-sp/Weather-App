<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
<script defer src="main.js"></script></head>
<body>
  <div id="main">
    <h1>Weather App</h1>

    <div id="search">
      <form>
        <input type="search" id="city" required placeholder="Enter Your City Name">
        <button type="submit">Get Weather</button>
      </form>

      <p id="warning"></p>
      <button id="toggleTemp">Switch °C / °F</button>
    </div>

    <div id="weatherInfo">
      <div id="cityName"></div>
      <div id="temp"></div>
      <div id="condition"></div>
      <div id="timeZone"></div>
      <div id="description"></div>
    </div>
  </div>
</body>
</html>
